<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#f8f9fa"/>

  <!-- BEFORE Section -->
  <g>
    <!-- Title -->
    <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">❌ Before</text>

    <!-- Frustrated person -->
    <g transform="translate(120, 80)">
      <!-- Desk -->
      <rect x="0" y="130" width="160" height="8" rx="4" fill="#5a5a5a"/>

      <!-- Person (simplified) -->
      <circle cx="80" cy="70" r="25" fill="#4d65ff" opacity="0.3"/>
      <rect x="60" y="95" width="40" height="50" rx="8" fill="#4d65ff" opacity="0.3"/>

      <!-- Laptop -->
      <rect x="45" y="115" width="70" height="45" rx="4" fill="#1a1a1a"/>
      <rect x="50" y="120" width="60" height="35" fill="#4d65ff" opacity="0.2"/>

      <!-- Scattered receipts -->
      <rect x="0" y="100" width="30" height="40" rx="3" fill="white" stroke="#ff5a0a" stroke-width="2" transform="rotate(-15 15 120)" filter="url(#shadow)"/>
      <rect x="130" y="105" width="30" height="40" rx="3" fill="white" stroke="#ff5a0a" stroke-width="2" transform="rotate(20 145 125)" filter="url(#shadow)"/>

      <!-- Phone with receipt photo -->
      <rect x="10" y="50" width="35" height="60" rx="6" fill="white" stroke="#1a1a1a" stroke-width="2" filter="url(#shadow)"/>
      <rect x="15" y="55" width="25" height="40" fill="#ff5a0a" opacity="0.3"/>
    </g>

    <!-- Time indicator -->
    <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ff5a0a">15-20 min per report</text>
    <text x="200" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5a5a5a">Manual entry</text>
  </g>

  <!-- Divider -->
  <line x1="400" y1="40" x2="400" y2="280" stroke="#e0e0e0" stroke-width="2"/>

  <!-- AFTER Section -->
  <g>
    <!-- Title -->
    <text x="600" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">✅ After</text>

    <!-- Happy person -->
    <g transform="translate(520, 80)">
      <!-- Desk -->
      <rect x="0" y="130" width="160" height="8" rx="4" fill="#5a5a5a"/>

      <!-- Person (relaxed) -->
      <circle cx="80" cy="70" r="25" fill="#4d65ff"/>
      <rect x="60" y="95" width="40" height="50" rx="8" fill="#4d65ff"/>

      <!-- Laptop with automated dashboard -->
      <rect x="45" y="115" width="70" height="45" rx="4" fill="#1a1a1a"/>
      <rect x="50" y="120" width="60" height="35" fill="#4d65ff"/>

      <!-- Checkmarks indicating automation -->
      <g fill="#4d65ff">
        <circle cx="30" cy="90" r="12" fill="white" stroke="#4d65ff" stroke-width="2"/>
        <path d="M 25 90 L 28 93 L 35 86" stroke="#4d65ff" stroke-width="2" fill="none"/>

        <circle cx="130" cy="95" r="12" fill="white" stroke="#4d65ff" stroke-width="2"/>
        <path d="M 125 95 L 128 98 L 135 91" stroke="#4d65ff" stroke-width="2" fill="none"/>
      </g>

      <!-- AI sparkle -->
      <g transform="translate(80, 50)">
        <circle cx="0" cy="0" r="15" fill="#ff5a0a" opacity="0.2"/>
        <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff5a0a">AI</text>
      </g>
    </g>

    <!-- Time indicator -->
    <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4d65ff">30 seconds</text>
    <text x="600" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5a5a5a">Fully automated</text>
  </g>
</svg>