<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff3ed;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- Email Icon -->
  <g transform="translate(100, 120)">
    <rect x="0" y="20" width="120" height="80" rx="8" fill="white" stroke="#4d65ff" stroke-width="3" filter="url(#shadow)"/>
    <path d="M 10 30 L 60 60 L 110 30" stroke="#4d65ff" stroke-width="3" fill="none"/>
    <line x1="10" y1="90" x2="110" y2="90" stroke="#ff5a0a" stroke-width="2"/>
  </g>

  <!-- Phone Icon -->
  <g transform="translate(100, 250)">
    <rect x="15" y="0" width="60" height="100" rx="8" fill="white" stroke="#4d65ff" stroke-width="3" filter="url(#shadow)"/>
    <rect x="25" y="10" width="40" height="60" rx="2" fill="#e8ebff"/>
    <circle cx="45" cy="85" r="6" fill="#4d65ff"/>
  </g>

  <!-- Receipt 1 -->
  <g transform="translate(280, 100)">
    <rect x="0" y="0" width="80" height="110" rx="6" fill="white" stroke="#ff5a0a" stroke-width="2" filter="url(#shadow)"/>
    <line x1="10" y1="15" x2="70" y2="15" stroke="#e0e0e0" stroke-width="3"/>
    <line x1="10" y1="30" x2="70" y2="30" stroke="#e0e0e0" stroke-width="3"/>
    <line x1="10" y1="45" x2="50" y2="45" stroke="#e0e0e0" stroke-width="3"/>
    <line x1="10" y1="60" x2="70" y2="60" stroke="#e0e0e0" stroke-width="3"/>
    <line x1="10" y1="75" x2="40" y2="75" stroke="#ff5a0a" stroke-width="4"/>
  </g>

  <!-- Receipt 2 -->
  <g transform="translate(280, 230)">
    <rect x="0" y="0" width="80" height="110" rx="6" fill="white" stroke="#ff5a0a" stroke-width="2" filter="url(#shadow)"/>
    <line x1="10" y1="15" x2="70" y2="15" stroke="#e0e0e0" stroke-width="3"/>
    <line x1="10" y1="30" x2="70" y2="30" stroke="#e0e0e0" stroke-width="3"/>
    <line x1="10" y1="45" x2="50" y2="45" stroke="#e0e0e0" stroke-width="3"/>
    <line x1="10" y1="60" x2="70" y2="60" stroke="#e0e0e0" stroke-width="3"/>
    <line x1="10" y1="75" x2="40" y2="75" stroke="#ff5a0a" stroke-width="4"/>
  </g>

  <!-- Flow arrows -->
  <g>
    <path d="M 370 155 L 520 155" stroke="#ff5a0a" stroke-width="3" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </path>
    <polygon points="520,155 505,148 505,162" fill="#ff5a0a"/>

    <path d="M 370 285 L 520 285" stroke="#ff5a0a" stroke-width="3" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </path>
    <polygon points="520,285 505,278 505,292" fill="#ff5a0a"/>
  </g>

  <!-- AI Brain -->
  <g transform="translate(540, 180)">
    <circle cx="0" cy="0" r="40" fill="#4d65ff" opacity="0.1"/>
    <circle cx="0" cy="0" r="30" fill="#4d65ff" opacity="0.2"/>
    <circle cx="0" cy="0" r="20" fill="#4d65ff" opacity="0.3"/>

    <!-- AI sparkles -->
    <circle cx="-15" cy="-15" r="3" fill="#ff5a0a">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="-15" r="3" fill="#ff5a0a">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-15" cy="15" r="3" fill="#ff5a0a">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="15" cy="15" r="3" fill="#ff5a0a">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>

    <!-- AI text -->
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">AI</text>
  </g>

  <!-- Dashboard -->
  <g transform="translate(700, 80)">
    <rect x="0" y="0" width="440" height="280" rx="12" fill="white" stroke="#4d65ff" stroke-width="4" filter="url(#shadow)"/>

    <!-- Dashboard header -->
    <rect x="15" y="15" width="410" height="50" rx="8" fill="#4d65ff"/>
    <text x="220" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Categorized Expenses</text>

    <!-- Category bars -->
    <g transform="translate(40, 100)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">🚗 Transportation</text>
      <rect x="0" y="25" width="280" height="28" rx="4" fill="#ff5a0a"/>
      <text x="290" y="43" font-family="Arial, sans-serif" font-size="14" fill="#5a5a5a">$1,247</text>
    </g>

    <g transform="translate(40, 165)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">🍽️ Meals & Entertainment</text>
      <rect x="0" y="25" width="200" height="28" rx="4" fill="#4d65ff"/>
      <text x="210" y="43" font-family="Arial, sans-serif" font-size="14" fill="#5a5a5a">$843</text>
    </g>

    <g transform="translate(40, 230)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">📎 Office Supplies</text>
      <rect x="0" y="25" width="120" height="28" rx="4" fill="#ff5a0a"/>
      <text x="130" y="43" font-family="Arial, sans-serif" font-size="14" fill="#5a5a5a">$412</text>
    </g>
  </g>

  <!-- Connection lines -->
  <g stroke="#4d65ff" stroke-width="2" fill="none" opacity="0.3">
    <path d="M 540 200 Q 600 150, 700 140"/>
    <path d="M 540 200 Q 600 220, 700 220"/>
    <path d="M 540 200 Q 600 290, 700 300"/>
  </g>
</svg>